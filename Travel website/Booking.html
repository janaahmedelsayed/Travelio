<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelio - Booking</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Styles/booking.css" />
  </head>
  <body>
    <!--  Navbar -->
    <iframe src="navbar.html" class="nav-iframe"></iframe>

    <div class="booking-container">
      <div class="booking-card">
        <h1>Book Your Dream Trip</h1>
        <p class="subtitle">Fill out the form below to secure your spot.</p>
        <form action="index.html" method="get">
          <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required />
          </div>
          <div class="input-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="john@example.com"
              required
            />
          </div>
          <div class="input-group">
            <label for="people">Number of People</label>
            <input
              type="number"
              id="people"
              min="1"
              max="20"
              placeholder="2"
              required
            />
          </div>
          <div class="input-group">
            <label for="date">Travel Date</label>
            <input type="date" id="date" required />
          </div>
          <button type="submit" class="btn-submit">Submit Booking</button>
        </form>
      </div>
    </div>

    <!--  Footer -->
    <iframe src="footer.html" class="footer-iframe" scrolling="no"></iframe>
  </body>
</html>
