<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelio - Rate Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="Styles/rate.css" />
  </head>
  <body>
    <!--  Navbar -->
    <iframe src="navbar.html" class="nav-iframe"></iframe>

    <div class="rate-container">
      <div class="rate-card">
        <h1>Rate Your Experience</h1>
        <div class="stars">
          <span style="color:#ff8e42">★</span><span style="color:#ff8e42">★</span><span style="color:#ff8e42">★</span><span style="color:#ff8e42">★</span><span style="color:#ff8e42">★</span>
        </div>
        
        <form action="#" method="get">
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="experience" value="Excellent" required>
              <span class="custom-radio"></span> Excellent
            </label>
            <label class="radio-option">
              <input type="radio" name="experience" value="Good">
              <span class="custom-radio"></span> Good
            </label>
            <label class="radio-option">
              <input type="radio" name="experience" value="Bad">
              <span class="custom-radio"></span> Bad
            </label>
          </div>
          
          <div class="input-group">
            <label for="feedback">Write your opinion</label>
            <textarea id="feedback" rows="4" placeholder="Tell us what you loved or what we can improve..." required></textarea>
          </div>
          
          <button type="submit" class="btn-submit">Submit Review</button>
        </form>
      </div>
    </div>

    <!--  Footer -->
    <iframe src="footer.html" class="footer-iframe" scrolling="no"></iframe>
  </body>
</html>
