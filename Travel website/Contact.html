<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelio - Contact Us</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="Styles/contact.css" />
  </head>
  <body>
    <!--  Navbar -->
    <iframe src="navbar.html" class="nav-iframe"></iframe>

    <div class="contact-container">
      <h1 class="page-title">Contact Us</h1>

      <div class="contact-wrapper">
        <div class="contact-info">
          <h3>Get in Touch</h3>
          <p>We're here to help and answer any question you might have.</p>

          <div class="info-item">
            <i class="fa-solid fa-phone"></i>
            <span>(+20)1012345678</span>
          </div>
          <div class="info-item">
            <i class="fa-solid fa-envelope"></i>
            <span>support@travelio.com</span>
          </div>
          <div class="info-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>123 Global Way, Travel City, NY 10001</span>
          </div>
        </div>

        <div class="contact-form">
          <form action="#" method="get">
            <div class="input-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" placeholder="Name" required />
            </div>
            <div class="input-group">
              <label for="email">Your Email</label>
              <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
              />
            </div>
            <div class="input-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                rows="5"
                placeholder="How can we help you?"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn-submit">Send Message</button>
          </form>
        </div>
      </div>
    </div>

    <!--  Footer -->
    <iframe src="footer.html" class="footer-iframe" scrolling="no"></iframe>
  </body>
</html>
